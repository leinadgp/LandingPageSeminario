<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscrição Confirmada - Agente Swateens</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#0f172a',
                            gold: '#eab308',
                            light: '#f8fafc'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-brand-blue min-h-screen flex flex-col items-center justify-center p-4 relative overflow-hidden">
    
    <div class="absolute inset-0 opacity-10 bg-[url('capa.png')] bg-cover bg-center"></div>

    <div class="relative z-10 mb-8 text-center">
        <span class="text-brand-gold font-bold uppercase tracking-widest text-xs mb-2 block">Seminário Assembleia de Deus</span>
        <h2 class="text-3xl md:text-4xl font-extrabold text-white">
            Agente <span class="text-brand-gold">Swateens</span>
        </h2>
    </div>

    <div class="relative z-10 bg-white p-8 md:p-12 rounded-3xl shadow-2xl border border-slate-100 max-w-md w-full text-center overflow-hidden">
        
        <div class="absolute top-0 right-0 w-32 h-32 bg-green-50 rounded-bl-full -z-0"></div>

        <div class="relative z-10">
            <div class="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner border-4 border-white">
                <i class="fa-solid fa-check text-5xl text-green-500"></i>
            </div>

            <h1 class="text-3xl font-extrabold text-brand-blue mb-3">Tudo Certo!</h1>
            <p class="text-slate-600 mb-8 leading-relaxed font-medium">
                Pagamento aprovado. A inscrição do participante foi validada e registrada com sucesso no sistema.
            </p>

            <button onclick="window.close(); history.back();" class="w-full bg-brand-light border-2 border-slate-200 text-slate-700 font-bold text-lg py-4 px-8 rounded-xl hover:bg-slate-100 hover:border-slate-300 transition shadow-sm active:scale-[0.99]">
                Fechar Janela
            </button>
        </div>
    </div>

</body>
</html>
